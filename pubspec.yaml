name: esumbong
description: "eSumbong Mobile App Flutter scaffold."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  http: ^1.3.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.9
  cloud_functions: ^5.6.0
  firebase_messaging: ^15.2.7
  firebase_storage: ^12.4.7
  file_picker: ^8.1.7
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
